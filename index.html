<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country AI — Intelligence Agent</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #0a0a0b;
            --accent-primary: #8e75ff;
            --text-main: #f0f0f0;
            --text-dim: #8e8e93;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-wrapper {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-container {
            flex: 1;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .chat-header h1 {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .status {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #34a853;
            border-radius: 50%;
        }

        .chat-body {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .message-wrapper {
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-container {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .gemini-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .message-bot {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.6;
            padding-top: 4px;
        }

        .message-user {
            align-self: flex-end;
            background: #1c1c1e;
            color: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            font-size: 0.92rem;
            max-width: 80%;
        }

        .chat-footer {
            padding: 24px 32px;
            background: var(--container-bg);
        }

        .input-wrapper {
            background: #141416;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 14px 10px 24px;
            display: flex;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input::placeholder {
            color: #555;
        }

        .send-btn {
            background: white;
            color: black;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #1c1c1e;
            color: #444;
        }

        /* Analyzing / Loading State */
        .typing-indicator {
            display: none;
            margin-top: 10px;
            padding-left: 48px;
        }

        .loading-content {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .loading-star {
            font-size: 1.1rem;
            color: var(--accent-primary);
            animation: spinAndPulse 2s linear infinite;
        }

        @keyframes spinAndPulse {
            0% { transform: rotate(0deg) scale(1); opacity: 0.7; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.7; }
        }

        #chatEntries b, #chatEntries strong {
            color: var(--accent-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="chat-container">
            <header class="chat-header">
                <h1>Country Intelligence Tool</h1>
                <div class="status">
                    <div class="status-dot"></div>
                    Active
                </div>
            </header>

            <main class="chat-body" id="chatEntries">
                <div class="message-wrapper">
                    <div class="bot-container">
                        <div class="gemini-icon">
                            <i class="bi bi-stars"></i>
                        </div>
                        <div class="message-bot">
                            Hello! I am your AI Country Agent. How can I help you today?
                        </div>
                    </div>
                </div>
            </main>

            <div class="typing-indicator" id="loadingIndicator">
                <div class="loading-content">
                    <i class="bi bi-stars loading-star"></i>
                    <span>Analyzing information...</span>
                </div>
            </div>

            <footer class="chat-footer">
                <form id="agentForm">
                    <div class="input-wrapper">
                        <input type="text" id="userInput" class="chat-input" placeholder="Ask about any country..." autocomplete="off" required>
                        <button type="submit" class="send-btn" id="submitBtn">
                            <i class="bi bi-arrow-up"></i>
                        </button>
                    </div>
                </form>
            </footer>
        </div>
    </div>

    <script>
        const form = document.getElementById('agentForm');
        const input = document.getElementById('userInput');
        const entries = document.getElementById('chatEntries');
        const loader = document.getElementById('loadingIndicator');
        const btn = document.getElementById('submitBtn');

        function createMessage(content, type) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            if (type === 'user') {
                wrapper.innerHTML = `<div class="message-user">${content}</div>`;
            } else {
                // Support basic markdown-style bolding for a cleaner look
                const formattedContent = content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                wrapper.innerHTML = `
                    <div class="bot-container">
                        <div class="gemini-icon"><i class="bi bi-stars"></i></div>
                        <div class="message-bot">${formattedContent}</div>
                    </div>
                `;
            }

            entries.appendChild(wrapper);
            entries.scrollTop = entries.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            createMessage(text, 'user');
            input.value = '';
            
            loader.style.display = 'block';
            entries.scrollTop = entries.scrollHeight;
            btn.disabled = true;

            try {
                const response = await fetch(`/ask?query=${encodeURIComponent(text)}`);
                const data = await response.json();
                
                loader.style.display = 'none';
                btn.disabled = false;
                
                if (data.response) {
                    createMessage(data.response, 'bot');
                } else {
                    createMessage("I encountered an issue. Please try again.", 'bot');
                }
            } catch (err) {
                loader.style.display = 'none';
                btn.disabled = false;
                createMessage("Service currently unavailable.", 'bot');
            }
        });
    </script>
</body>
</html>
